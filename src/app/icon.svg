<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <radialGradient id="dotgrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#080D1A"/>

  <!-- Top gradient accent line -->
  <rect x="7" y="2.5" width="18" height="1.5" rx="0.75" fill="url(#grad)" opacity="0.9"/>

  <!-- Outer ring — faded cyan -->
  <circle cx="16" cy="17" r="11.5" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.2"/>

  <!-- Mid ring — green -->
  <circle cx="16" cy="17" r="7.5" fill="none" stroke="#22C55E" stroke-width="1.5" opacity="0.45"/>

  <!-- Inner ring — bright gradient -->
  <circle cx="16" cy="17" r="4" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.9"/>

  <!-- Center dot -->
  <circle cx="16" cy="17" r="2.2" fill="url(#dotgrad)"/>

  <!-- Subtle glow dot (inner highlight) -->
  <circle cx="15.2" cy="16.2" r="0.7" fill="white" opacity="0.5"/>
</svg>
